version: '3.8'

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: keluarga-tree-neo4j
    ports:
      - "7474:7474"  # HTTP (Browser)
      - "7687:7687"  # Bolt (Driver)
    environment:
      - NEO4J_AUTH=neo4j/KeluargaTree2026!
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_security_auth__minimum__password__length=8
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    networks:
      - keluarga-tree-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Neo4j Browser (for admin UI)
  neo4j-browser:
    image: neo4j:5.26-community
    container_name: keluarga-tree-browser
    ports:
      - "7475:7474"
    environment:
      - NEO4J_AUTH=neo4j/KeluargaTree2026!
      - NEO4J_BROWSER_ALLOWED_ORIGIN=http://localhost:7474
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - keluarga-tree-network
    restart: unless-stopped
    profiles:
      - browser  # Only start with: docker-compose --profile browser up

volumes:
  neo4j_data:
    driver: local
    driver_opts:
      type: none
      device: /home/openclaw/.openclaw/workspace/projects/keluarga-tree/data/neo4j
      o: bind
  neo4j_logs:
    driver: local
    driver_opts:
      type: none
      device: /home/openclaw/.openclaw/workspace/projects/keluarga-tree/logs/neo4j
      o: bind
  neo4j_import:
    driver: local
    driver_opts:
      type: none
      device: /home/openclaw/.openclaw/workspace/projects/keluarga-tree/import
      o: bind
  neo4j_plugins:
    driver: local
    driver_opts:
      type: none
      device: /home/openclaw/.openclaw/workspace/projects/keluarga-tree/plugins
      o: bind

networks:
  keluarga-tree-network:
    driver: bridge

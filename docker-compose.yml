version: '3.8'

services:
  # Neo4j Database
  neo4j:
    image: neo4j:5.26-community
    container_name: keluarga-tree-neo4j
    ports:
      - "7474:7474"  # HTTP Browser
      - "7687:7687"  # Bolt Driver
    environment:
      - NEO4J_AUTH=neo4j/KeluargaTree2026!
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
    volumes:
      - ./data/neo4j:/data
      - ./logs/neo4j:/logs
      - ./import:/import
      - ./plugins:/plugins
    networks:
      - keluarga-tree-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Go API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keluarga-tree-api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - SERVER_PORT=8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=KeluargaTree2026!
      - NEO4J_DATABASE=neo4j
      - JWT_SECRET=your-secret-key-change-in-production
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - keluarga-tree-network
    restart: unless-stopped

networks:
  keluarga-tree-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
